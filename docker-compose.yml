services:
  backend:
    build: ./backend
    container_name: guardianbox-backend

    environment:
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: guardianbox-encrypted

    ports:
      - "4000:4000"

    depends_on:
      - minio

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: guardianbox-frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: guardianbox-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    restart: unless-stopped

volumes:
  minio_data:
